# Fly.io config for the bitrunners game server.
# Deploys the Fastify health-check skeleton from apps/server.
# Real Colyseus + auth + persistence come in Phase 2 — this is the
# deploy-pipeline rehearsal (per docs/devlog/0004 Phase 1 OPS).

app = "bitrunners-server"
primary_region = "sea"

[build]
  dockerfile = "apps/server/Dockerfile"

[env]
  PORT = "8080"
  LOG_LEVEL = "info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "20s"
    timeout = "3s"
    grace_period = "10s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
